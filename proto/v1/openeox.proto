syntax = "proto3";
package openeox.v1;

import "google/protobuf/timestamp.proto";

option go_package = "github.com/carabiner-dev/openeox/types/v1";

// Shell is the top-level OpenEoX document containing lifecycle statements.
message Shell {
    // @gotags: json:"$schema"
    string schema = 1 [json_name = "$schema"];
    repeated Statement statements = 2;
}

// Statement binds lifecycle data (Core) to a product identity.
message Statement {
    Core core = 1;
    Product product = 2;
    ProductIdentificationHelper product_identification_helper = 3 [json_name = "product_identification_helper"];
}

// Product identifies what the lifecycle statement applies to.
// The $schema field discriminates between product types:
//   - product_software.json: uses product_name, product_version, vendor_name
//   - product_hardware.json: uses product_name, product_version, vendor_name
//   - product_hardware_with_software.json: uses hardware and software sub-products
message Product {
    // @gotags: json:"$schema"
    string schema = 1 [json_name = "$schema"];
    string product_name = 2 [json_name = "product_name"];
    string product_version = 3 [json_name = "product_version"];
    string vendor_name = 4 [json_name = "vendor_name"];
    Product hardware = 5;
    Product software = 6;
}

// ProductIdentificationHelper provides machine-readable identifiers for a
// product, modeled after CSAF v2.1's product_identification_helper.
message ProductIdentificationHelper {
    string cpe = 1;
    repeated string purls = 2;
    repeated string sbom_urls = 3 [json_name = "sbom_urls"];
    repeated CryptographicHashes hashes = 4;
    repeated GenericURI x_generic_uris = 5 [json_name = "x_generic_uris"];
}

// CryptographicHashes identifies a file by name and its cryptographic hashes.
message CryptographicHashes {
    string filename = 1;
    repeated FileHash file_hashes = 2 [json_name = "file_hashes"];
}

// FileHash is a single hash value computed over a file.
message FileHash {
    string algorithm = 1;
    string value = 2;
}

// GenericURI is a vendor-specific or not-yet-standardized identifier.
message GenericURI {
    string namespace = 1;
    string uri = 2;
}

// Core contains the lifecycle milestone dates (openeox-core v1.0).
// The eox_timestamp_t fields (end_of_life, end_of_security_support,
// end_of_sales, general_availability) may be "tba" in the upstream JSON
// format. The parser transparently maps "tba" to a sentinel far-future
// timestamp; use IsTBA() to check.
message Core {
    // @gotags: json:"$schema"
    string schema = 1 [json_name = "$schema"];

    // Required in spec: RFC 3339 date-time or "tba"
    google.protobuf.Timestamp end_of_life = 2 [json_name = "end_of_life"];
    google.protobuf.Timestamp end_of_security_support = 3 [json_name = "end_of_security_support"];

    // Required in spec: always RFC 3339 date-time (never "tba")
    google.protobuf.Timestamp last_updated = 5 [json_name = "last_updated"];

    // Optional in spec: RFC 3339 date-time or "tba"
    google.protobuf.Timestamp end_of_sales = 4 [json_name = "end_of_sales"];
    google.protobuf.Timestamp general_availability = 6 [json_name = "general_availability"];
}
